<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#020617" />
  <meta name="description" content="MediaAnalytics.AI - Aplikasi Pembuat Analisis Isu Otomatis menggunakan AI" />
  <title>MediaAnalytics.AI</title>

  <!-- Tipografi Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    body { margin: 0; padding: 0; background-color: #0b0f19; color: #f8fafc; font-family: 'Inter', sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #1e293b; border-radius: 10px; }
  </style>

  <!-- Peta Impor (Import Map) untuk memuat library React & Firebase langsung dari CDN -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>

  <!-- Babel Standalone untuk menerjemahkan sintaks JSX di dalam browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- KODE APLIKASI REACT UTAMA -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      FileText, Calendar, Cpu, Copy, CheckCircle, 
      AlertTriangle, ExternalLink, Megaphone, FileOutput, LogOut, 
      Star, ArrowRightCircle, Mail, Lock, Key, UserPlus, Link as LinkIcon
    } from 'lucide-react';

    import { initializeApp } from 'firebase/app';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from 'firebase/auth';
    import { getFirestore, doc, setDoc, getDoc, updateDoc } from 'firebase/firestore';

    // =========================================================================
    // KONFIGURASI FIREBASE
    // =========================================================================
    const myFirebaseConfig = {
      apiKey: "AIzaSyDPX1o4ps_Pthwx3HEiGYfPnoiHZIfRv40",
      authDomain: "media-analytics-d79db.firebaseapp.com",
      projectId: "media-analytics-d79db",
      storageBucket: "media-analytics-d79db.firebasestorage.app",
      messagingSenderId: "174374714022",
      appId: "1:174374714022:web:f35f576a58bc3a2df61267"
    };

    const app = initializeApp(myFirebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const App = () => {
      // --- STATE OTENTIKASI & PENGGUNA ---
      const [user, setUser] = useState(null);
      const [userData, setUserData] = useState(null); 
      const [authView, setAuthView] = useState('login'); 
      const [authForm, setAuthForm] = useState({ email: '', password: '', accessCode: '' });
      const [authLoading, setAuthLoading] = useState(false);
      const [authMessage, setAuthMessage] = useState({ type: '', text: '' });
      
      const [geminiApiKey, setGeminiApiKey] = useState("");
      const [isSystemInit, setIsSystemInit] = useState(false);

      // --- STATE UPGRADE PREMIUM (MODAL) ---
      const [showUpgradeModal, setShowUpgradeModal] = useState(false);
      const [modalMode, setModalMode] = useState('buy'); 
      const [upgradeCode, setUpgradeCode] = useState('');
      const [upgradeLoading, setUpgradeLoading] = useState(false);
      const [upgradeMsg, setUpgradeMsg] = useState({ type: '', text: '' });

      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxxpvPkfPM88Xs5J2cJL6r112PKrahH6f0eTUJrc8ArJrjfzyY7sqdjnK-Zbm0vGvdF0A/exec";

      const [formData, setFormData] = useState({
        date: new Date().toISOString().split('T')[0],
        title: '',
        content: '',
        sourceUrl: ''
      });

      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [result, setResult] = useState(null);
      const [copiedSection, setCopiedSection] = useState(null);
      const [errorMsg, setErrorMsg] = useState(null);

      // --- HANDLERS ---
      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleAuthInputChange = (e) => {
        setAuthForm({ ...authForm, [e.target.name]: e.target.value });
      };

      const openUpgradeModal = () => {
        setModalMode('buy');
        setUpgradeMsg({ type: '', text: '' });
        setShowUpgradeModal(true);
      };

      useEffect(() => {
        const fetchGeminiKey = async () => {
          try {
            const nocacheUrl = `${SCRIPT_URL}?action=getConfig&t=${new Date().getTime()}`;
            const response = await fetch(nocacheUrl);
            const secureData = await response.json();
            if (secureData.geminiApiKey) setGeminiApiKey(secureData.geminiApiKey);
          } catch (error) {}
        };
        fetchGeminiKey();

        const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
          setUser(currentUser);
          if (currentUser) {
            try {
              const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
              if (userDoc.exists()) {
                setUserData(userDoc.data());
              }
            } catch (e) {}
          } else {
            setUserData(null);
          }
          setIsSystemInit(true); 
        });
        return () => unsubscribe();
      }, []);

      const handleGuestLogin = async (e) => {
        e.preventDefault();
        setAuthLoading(true);
        setAuthMessage({ type: '', text: '' });
        const guestPassword = "GuestMedia2026!Secure"; 
        try {
          await signInWithEmailAndPassword(auth, authForm.email, guestPassword);
        } catch (error) {
          if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
            try {
              const userCredential = await createUserWithEmailAndPassword(auth, authForm.email, guestPassword);
              const newUserData = {
                email: userCredential.user.email,
                uid: userCredential.user.uid,
                role: 'guest',
                tokens: 2, 
                registeredAt: new Date().toISOString()
              };
              await setDoc(doc(db, 'users', userCredential.user.uid), newUserData);
              setUserData(newUserData);
              try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newUserData) });
              } catch (e) {}
            } catch (createError) {
              setAuthMessage({ type: 'error', text: 'GAGAL MEMBUAT AKSES TAMU.' });
            }
          } else {
            setAuthMessage({ type: 'error', text: 'EMAIL INI AKUN PREMIUM. SILAKAN LOGIN PREMIUM.' });
          }
        } finally { setAuthLoading(false); }
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        setAuthLoading(true);
        setAuthMessage({ type: '', text: '' });
        try {
          await signInWithEmailAndPassword(auth, authForm.email, authForm.password);
        } catch (error) {
          setAuthMessage({ type: 'error', text: 'EMAIL ATAU PASSWORD TIDAK VALID.' });
        } finally { setAuthLoading(false); }
      };

      const handleSignup = async (e) => {
        e.preventDefault();
        setAuthLoading(true);
        setAuthMessage({ type: '', text: '' });
        try {
          const nocacheUrl = `${SCRIPT_URL}?action=validateCode&code=${authForm.accessCode}&t=${new Date().getTime()}`;
          const valRes = await fetch(nocacheUrl);
          const valData = await valRes.json();
          if (!valData.valid) {
            setAuthMessage({ type: 'error', text: 'KODE AKSES TIDAK VALID.' });
            setAuthLoading(false);
            return;
          }
          const userCredential = await createUserWithEmailAndPassword(auth, authForm.email, authForm.password);
          const newUserData = {
            email: userCredential.user.email,
            uid: userCredential.user.uid,
            role: 'premium', tokens: 'unlimited',
            registeredAt: new Date().toISOString()
          };
          await setDoc(doc(db, 'users', userCredential.user.uid), newUserData);
          setUserData(newUserData);
        } catch (error) {
          setAuthMessage({ type: 'error', text: 'PENDAFTARAN GAGAL: ' + error.message.toUpperCase() });
        } finally { setAuthLoading(false); }
      };

      const handleResetPassword = async (e) => {
        e.preventDefault();
        setAuthLoading(true);
        try {
          await sendPasswordResetEmail(auth, authForm.email);
          setAuthMessage({ type: 'success', text: 'TAUTAN RESET TERKIRIM.' });
        } catch (error) {
          setAuthMessage({ type: 'error', text: 'GAGAL MENGIRIM TAUTAN.' });
        } finally {
          setAuthLoading(false);
        }
      };

      const handleLogout = () => {
        signOut(auth);
        setFormData({ date: new Date().toISOString().split('T')[0], title: '', content: '', sourceUrl: '' });
        setResult(null);
      };

      const handleUpgradePremium = async () => {
        if (!upgradeCode) return;
        setUpgradeLoading(true);
        try {
          const nocacheUrl = `${SCRIPT_URL}?action=validateCode&code=${upgradeCode}&t=${new Date().getTime()}`;
          const valRes = await fetch(nocacheUrl);
          const valData = await valRes.json();
          if (!valData.valid) {
            setUpgradeMsg({ type: 'error', text: 'KODE TIDAK VALID.' });
            setUpgradeLoading(false);
            return;
          }
          await updateDoc(doc(db, 'users', user.uid), { role: 'premium', tokens: 'unlimited' });
          setUserData(prev => ({ ...prev, role: 'premium', tokens: 'unlimited' }));
          setUpgradeMsg({ type: 'success', text: 'AKUN PREMIUM DIAKTIFKAN!' });
          setTimeout(() => setShowUpgradeModal(false), 2000);
        } catch (error) { setUpgradeMsg({ type: 'error', text: 'KESALAHAN SISTEM.' }); }
        finally { setUpgradeLoading(false); }
      };

      const handleReset = () => {
        setFormData({ date: new Date().toISOString().split('T')[0], title: '', content: '', sourceUrl: '' });
        setResult(null);
        setErrorMsg(null);
      };

      // =========================================================================
      // FUNGSI FETCH WITH RETRY
      // =========================================================================
      const fetchWithRetry = async (url, options, retries = 3) => {
        const delays = [1000, 2000, 4000];
        let lastError = null;
        for (let i = 0; i < retries; i++) {
          try {
            const response = await fetch(url, options);
            if (!response.ok) {
               let errorText = await response.text();
               let errorMessage = `E${response.status}`;
               try {
                 const jsonObj = JSON.parse(errorText);
                 if (jsonObj.error && jsonObj.error.message) errorMessage = jsonObj.error.message;
               } catch(e) {}
               const error = new Error(errorMessage);
               error.status = response.status;
               throw error;
            }
            return await response.json();
          } catch (error) {
            lastError = error;
            // Jika error adalah 429 (Quota Exceeded), kita lempar langsung tanpa retry lama agar pesan langsung muncul
            if (error.status && error.status >= 400 && error.status < 500 && error.status !== 429) throw error; 
            if (i === retries - 1) throw error;
            await new Promise(res => setTimeout(res, delays[i]));
          }
        }
        throw lastError;
      };

      const generateAnalysis = async () => {
        if (userData?.role === 'guest' && userData?.tokens <= 0) { openUpgradeModal(); return; }
        if (!formData.title || !formData.content) { setErrorMsg("ISI DATA TERLEBIH DAHULU."); return; }
        
        setIsAnalyzing(true);
        setErrorMsg(null);
        
        const systemPrompt = `Anda adalah Analis Media dan Kebijakan Publik profesional. 
Tugas Anda adalah membedah berita dengan analisis mendalam dan komprehensif.
WAJIB: Tulis dalam Bahasa Indonesia EYD yang baik dan benar (bukan huruf kapital semua).
WAJIB: Berikan output HANYA dalam format JSON murni tanpa teks pembuka atau markdown tags.
Struktur JSON: {
  "resume": "string", 
  "analisis_deskriptif": "string",
  "swot_kekuatan": ["string"], 
  "swot_kelemahan": ["string"], 
  "swot_peluang": ["string"], 
  "swot_ancaman": ["string"], 
  "kebijakan": ["string"], 
  "strategi_komunikasi": ["string"],
  "rekomendasi_publikasi": ["string"],
  "kesimpulan": "string"
}`;

        try {
          let apiKey = geminiApiKey ? geminiApiKey.trim().replace(/[^A-Za-z0-9_\-]/g, "") : "";
          let finalTargetModel = "gemini-1.5-flash"; 
          const isCanvasEnv = typeof __app_id !== 'undefined';
          let data = null;

          if (isCanvasEnv) {
            apiKey = ""; 
            finalTargetModel = "gemini-2.5-flash-preview-09-2025";
            const endpointUrl = `https://generativelanguage.googleapis.com/v1beta/models/${finalTargetModel}:generateContent?key=${apiKey}`;
            data = await fetchWithRetry(endpointUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `${systemPrompt}\n\nDATA BERITA:\nJudul: ${formData.title}\n\nIsi: ${formData.content}` }] }] })
            });
          } else {
            if (!apiKey) throw new Error("API Key Gemini tidak terbaca. Refresh halaman atau cek Google Apps Script.");

            // 1. TANYA GOOGLE: MENGGUNAKAN SISTEM AUTO-SCANNER 
            try {
                const modelsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                if (modelsRes.ok) {
                    const modelsData = await modelsRes.json();
                    if (modelsData.models) {
                        const availableModels = modelsData.models
                            .filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent'))
                            .map(m => m.name.replace('models/', ''));
                        
                        if (availableModels.length > 0) {
                            if (availableModels.includes('gemini-1.5-flash')) finalTargetModel = 'gemini-1.5-flash';
                            else if (availableModels.includes('gemini-2.5-flash')) finalTargetModel = 'gemini-2.5-flash';
                            else if (availableModels.includes('gemini-1.5-pro')) finalTargetModel = 'gemini-1.5-pro';
                            else finalTargetModel = availableModels[0]; 
                        }
                    }
                }
            } catch (scannerErr) {
                 console.warn("Scanner model gagal jaringan, menggunakan fallback default.");
            }

            // 2. EKSEKUSI PEMROSESAN AI DENGAN MODEL YANG SUDAH PASTI ADA
            const endpointUrl = `https://generativelanguage.googleapis.com/v1beta/models/${finalTargetModel}:generateContent?key=${apiKey}`;
            const safePayload = {
              contents: [{ parts: [{ text: `${systemPrompt}\n\nDATA BERITA:\nJudul: ${formData.title}\n\nIsi: ${formData.content}` }] }]
            };

            data = await fetchWithRetry(endpointUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(safePayload)
            });
          }
          
          let textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!textResponse) throw new Error("Respons Kosong");
          
          let parsedData;
          try {
            const jsonMatch = textResponse.match(/\{[\s\S]*\}/);
            const cleanJson = jsonMatch ? jsonMatch[0] : textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
            parsedData = JSON.parse(cleanJson);
          } catch (parseErr) {
            throw new Error("Format JSON Gagal. AI tidak merespon dalam format yang diminta.");
          }
          
          const kebijakanArr = parsedData.kebijakan || [];
          const komunikasiArr = parsedData.strategi_komunikasi || [];
          const publikasiArr = parsedData.rekomendasi_publikasi || [];

          const parseToStringArray = (arr) => arr.map(item => {
            if (typeof item === 'object' && item !== null) {
              const values = Object.values(item);
              return values.length > 1 ? `${values[0]}: ${values.slice(1).join(' ')}` : String(values[0]);
            }
            return String(item);
          });

          setResult({
            resume: typeof parsedData.resume === 'string' ? parsedData.resume : "Tidak tersedia.",
            analisis_deskriptif: typeof parsedData.analisis_deskriptif === 'string' ? parsedData.analisis_deskriptif : "Tidak tersedia.",
            swot_kekuatan: Array.isArray(parsedData.swot_kekuatan) ? parseToStringArray(parsedData.swot_kekuatan) : ["-"],
            swot_kelemahan: Array.isArray(parsedData.swot_kelemahan) ? parseToStringArray(parsedData.swot_kelemahan) : ["-"],
            swot_peluang: Array.isArray(parsedData.swot_peluang) ? parseToStringArray(parsedData.swot_peluang) : ["-"],
            swot_ancaman: Array.isArray(parsedData.swot_ancaman) ? parseToStringArray(parsedData.swot_ancaman) : ["-"],
            kebijakan: Array.isArray(kebijakanArr) && kebijakanArr.length > 0 ? parseToStringArray(kebijakanArr) : ["-"],
            strategi_komunikasi: Array.isArray(komunikasiArr) && komunikasiArr.length > 0 ? parseToStringArray(komunikasiArr) : ["-"],
            rekomendasi_publikasi: Array.isArray(publikasiArr) && publikasiArr.length > 0 ? parseToStringArray(publikasiArr) : ["-"],
            kesimpulan: typeof parsedData.kesimpulan === 'string' ? parsedData.kesimpulan : "Tidak tersedia.",
            sourceUrl: formData.sourceUrl
          });

          if (userData?.role === 'guest' && userData.tokens > 0) {
            const newTokens = userData.tokens - 1;
            await updateDoc(doc(db, 'users', user.uid), { tokens: newTokens });
            setUserData(prev => ({ ...prev, tokens: newTokens }));
          }

        } catch (error) {
          // PENANGANAN ERROR LEBIH RAPI (Menangani 429 Quota Exceeded)
          const errMsg = error.message ? error.message.toUpperCase() : "MASALAH SERVER";
          if (error.status === 429 || errMsg.includes("QUOTA") || errMsg.includes("EXCEEDED")) {
            setErrorMsg("MOHON MAAF SERVER AI SEDANG SIBUK, SILAHKAN COBA KEMBALI 5-10 MENIT LAGI");
          } else {
            setErrorMsg(`GAGAL: ${errMsg}`);
          }
          setTimeout(() => setErrorMsg(null), 12000); 
        } finally {
          setIsAnalyzing(false); 
        }
      };

      const copyToClipboard = (text, sectionName) => {
        navigator.clipboard.writeText(text);
        setCopiedSection(sectionName);
        setTimeout(() => setCopiedSection(null), 2000);
      };

      const getFormattedText = () => {
        if (!result) return '';
        const formatList = (arr) => (arr || []).map(i => `- ${i}`).join('\n');
        return `MediaAnalytics.AI - ${formData.title}\n\n1. RESUME BERITA:\n${result.resume}\n\n2. ANALISIS DESKRIPTIF:\n${result.analisis_deskriptif}\n\n3. ANALISIS SWOT:\n[KEKUATAN]\n${formatList(result.swot_kekuatan)}\n\n[KELEMAHAN]\n${formatList(result.swot_kelemahan)}\n\n[PELUANG]\n${formatList(result.swot_peluang)}\n\n[ANCAMAN]\n${formatList(result.swot_ancaman)}\n\n4. REKOMENDASI KEBIJAKAN:\n${formatList(result.kebijakan)}\n\n5. STRATEGI KOMUNIKASI:\n${formatList(result.strategi_komunikasi)}\n\n6. REKOMENDASI PUBLIKASI:\n${formatList(result.rekomendasi_publikasi)}\n\n7. KESIMPULAN:\n${result.kesimpulan}`;
      };

      const downloadWord = () => {
        const formatListHtml = (arr) => `<ul>${(arr || []).map(i => `<li>${i}</li>`).join('')}</ul>`;
        const content = `<html><head><meta charset="utf-8"><style>body{font-family: Arial, sans-serif; line-height: 1.6;} h2{color: #1e3a8a;} h3{color: #0f172a; margin-top: 20px;} h4{color: #334155;}</style></head><body>
          <h2>${formData.title}</h2>
          <p><em>Tanggal: ${formData.date}</em></p>
          <hr/>
          <h3>1. Resume Berita</h3><p>${result.resume}</p>
          <h3>2. Analisis Deskriptif</h3><p>${result.analisis_deskriptif}</p>
          <h3>3. Analisis SWOT</h3>
          <h4>Strengths (Kekuatan)</h4>${formatListHtml(result.swot_kekuatan)}
          <h4>Weaknesses (Kelemahan)</h4>${formatListHtml(result.swot_kelemahan)}
          <h4>Opportunities (Peluang)</h4>${formatListHtml(result.swot_peluang)}
          <h4>Threats (Ancaman)</h4>${formatListHtml(result.swot_ancaman)}
          <h3>4. Rekomendasi Kebijakan</h3>${formatListHtml(result.kebijakan)}
          <h3>5. Strategi Komunikasi</h3>${formatListHtml(result.strategi_komunikasi)}
          <h3>6. Rekomendasi Publikasi</h3>${formatListHtml(result.rekomendasi_publikasi)}
          <h3>7. Kesimpulan</h3><p>${result.kesimpulan}</p>
          </body></html>`;
        const blob = new Blob([content], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `Analisis_Media_${formData.date}.doc`;
        link.click();
      };

      const renderUpgradeModal = () => {
        if (!showUpgradeModal) return null;
        return (
          <div className="fixed inset-0 z-[100] bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-4">
            <div className="bg-[#111827] border border-slate-700/50 rounded-[40px] w-full max-w-[380px] overflow-hidden shadow-2xl flex flex-col relative animate-in zoom-in-95">
              <div className="bg-gradient-to-r from-[#8b5cf6] to-[#3b82f6] pt-8 pb-6 px-4 text-center relative">
                <button onClick={() => setShowUpgradeModal(false)} className="absolute top-5 right-5 text-white/70 hover:text-white transition-colors">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
                <h2 className="text-2xl font-black text-white tracking-wider uppercase">UPGRADE PREMIUM</h2>
                <p className="text-white/90 text-xs mt-1 font-bold">Akses Tanpa Batas & Riwayat Cloud</p>
              </div>
              <div className="p-8 flex flex-col items-center bg-[#111827]">
                {modalMode === 'buy' ? (
                  <>
                    <div className="bg-[#1f2937] border border-slate-700/30 rounded-3xl p-8 text-center w-full mb-8 shadow-inner">
                      <p className="text-sm font-bold text-slate-300 mb-2 uppercase tracking-widest">Dapatkan Kode Akses</p>
                      <p className="text-4xl font-black text-[#22c55e] mb-4">Rp 25.000</p>
                      <p className="text-[10px] text-slate-400 leading-relaxed font-semibold uppercase tracking-tighter">Beli kode akses premium melalui Admin untuk menggunakan aplikasi sepuasnya.</p>
                    </div>
                    <a href="https://wa.me/6287838960454?text=Halo%20Admin,%20saya%20ingin%20membeli%20kode%20akses%20Premium." target="_blank" rel="noopener noreferrer" className="w-full bg-[#22c55e] hover:bg-[#16a34a] text-white font-black py-4 rounded-2xl uppercase tracking-widest text-sm transition-all shadow-lg text-center block mb-6">HUBUNGI ADMIN</a>

                  </>

                  <>
                    <div className="w-full mb-6 text-center">
                      <label className="block text-[10px] font-black text-cyan-500 uppercase tracking-[0.3em] mb-3">MASUKKAN KODE AKSES</label>

                    <button onClick={handleUpgradePremium} disabled={upgradeLoading || !upgradeCode} className="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-sm transition-all shadow-lg">{upgradeLoading ? 'MEMPROSES...' : 'AKTIFKAN SEKARANG'}</button>
                    {upgradeMsg.text && <p className="mt-4 text-[10px] font-black text-red-500 uppercase tracking-widest text-center">{upgradeMsg.text}</p>}
                    <button onClick={() => setModalMode('buy')} className="mt-6 text-[10px] font-black text-slate-500 hover:text-white uppercase tracking-widest">KEMBALI</button>
                  </>
                )}

            </div>
          </div>
        );

      if (!isSystemInit) {
        return (
          <div className="min-h-screen bg-[#020617] flex items-center justify-center relative overflow-hidden">

      // =========================================================================
      // RENDER HALAMAN AUTENTIKASI 
      // =========================================================================
      if (!user) {
        return (
          <div className="min-h-screen bg-[#020617] flex flex-col items-center justify-center p-4 relative font-sans">
            {renderUpgradeModal()}
            <div className="absolute inset-0 overflow-hidden pointer-events-none opacity-[0.25] mix-blend-screen filter grayscale-[30%]">
              <div className="absolute -top-[15%] -left-[5%] w-[60%] h-[70%] bg-cover bg-center rotate-[-6deg] rounded-[3rem] shadow-2xl blur-[3px]" style={{ backgroundImage: `url('https://images.unsplash.com/photo-1585829365295-ab7cd400c167?q=80&w=1000&auto=format&fit=crop')` }}></div>
              <div className="absolute top-[5%] -right-[10%] w-[65%] h-[60%] bg-cover bg-center rotate-[4deg] rounded-[3rem] shadow-2xl blur-[2px]" style={{ backgroundImage: `url('https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=1000&auto=format&fit=crop')` }}></div>
              <div className="absolute -bottom-[15%] left-[20%] w-[70%] h-[65%] bg-cover bg-center rotate-[-3deg] rounded-[3rem] shadow-2xl blur-[4px]" style={{ backgroundImage: `url('https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=1000&auto=format&fit=crop')` }}></div>
              <div className="absolute inset-0 bg-gradient-to-b from-[#020617] via-transparent to-[#020617]"></div>
            </div>

            <div className="w-full max-w-[420px] bg-[#111827] border border-slate-800 rounded-[50px] p-10 z-10 shadow-[0_0_80px_rgba(0,0,0,0.8)] flex flex-col items-center animate-in fade-in zoom-in-95 duration-500">
              <div className="w-16 h-16 rounded-full bg-[#0d1321] border border-cyan-900/50 flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(6,182,212,0.15)]"><FileText size={28} className="text-cyan-400" /></div>
              <h1 className="text-4xl font-black text-white tracking-tighter mb-1 uppercase">MediaAnalytics<span className="text-cyan-500">.AI</span></h1>
              <p className="text-[10px] text-slate-500 font-bold tracking-[0.2em] uppercase mb-12 text-center leading-relaxed">Aplikasi Pembuat Analisis Isu Otomatis</p>

              {authMessage.text && <div className={`w-full p-4 rounded-2xl mb-6 text-[11px] font-black border flex items-start gap-3 ${authMessage.type === 'error' ? 'bg-red-500/10 text-red-500 border-red-500/30' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30'}`}><AlertTriangle size={18} className="shrink-0" /> <span className="uppercase tracking-widest">{authMessage.text}</span></div>}

              {authView === 'login' && (
                <form onSubmit={handleLogin} className="w-full space-y-6">
                  <div className="flex items-center mb-4"><div className="w-1.5 h-6 bg-cyan-400 rounded-full mr-3 shadow-[0_0_8px_#22d3ee]"></div><h2 className="text-lg font-black text-white tracking-widest uppercase">LOGIN PREMIUM</h2></div>
                  <div className="space-y-5">
                    <div><label className="block text-[10px] font-black text-cyan-500 uppercase tracking-[0.2em] mb-2">EMAIL</label><input type="email" name="email" required value={authForm.email} onChange={handleAuthInputChange} className="w-full bg-[#0d121f] border border-slate-700/50 rounded-2xl px-5 py-4 text-white outline-none focus:border-cyan-500 transition-all font-semibold" placeholder="user@mediaanalytics.ai" /></div>
                    <div><label className="block text-[10px] font-black text-cyan-500 uppercase tracking-[0.2em] mb-2">PASSWORD</label><input type="password" name="password" required value={authForm.password} onChange={handleAuthInputChange} className="w-full bg-[#0d121f] border border-slate-700/50 rounded-2xl px-5 py-4 text-white outline-none focus:border-cyan-500 transition-all" placeholder="••••••••" /></div>
                  </div>
                  <div className="flex justify-end"><button type="button" onClick={() => setAuthView('forgot')} className="text-cyan-500 text-[11px] font-black hover:underline uppercase tracking-widest">Lupa Password?</button></div>
                  <button type="submit" disabled={authLoading} className="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-black py-4 rounded-2xl shadow-[0_4px_15px_rgba(6,182,212,0.3)] uppercase tracking-[0.2em] text-sm transition-all">{authLoading ? 'MEMPROSES...' : 'ACCESS SYSTEM'}</button>
                  <button type="button" onClick={() => setAuthView('guest')} className="w-full bg-[#1c2438] border border-slate-700 hover:bg-[#252f4a] text-white font-black py-4 rounded-2xl flex items-center justify-center gap-3 uppercase tracking-widest text-[13px] transition-all"><ArrowRightCircle size={20} className="text-green-400" /> COBA GRATIS (TAMU)</button>
                  <div className="text-center mt-8 text-[11px] font-black tracking-widest text-slate-500 uppercase">BELUM PUNYA AKUN PREMIUM? <button type="button" onClick={() => setAuthView('signup')} className="text-cyan-500 hover:text-white transition-colors ml-1 underline decoration-cyan-500/30 underline-offset-4">REGISTRASI</button></div>
                </form>
              )}

              {authView === 'guest' && (
                <form onSubmit={handleGuestLogin} className="w-full space-y-6">
                  <div className="flex items-center mb-4"><div className="w-1.5 h-6 bg-green-400 rounded-full mr-3 shadow-[0_0_8px_#4ade80]"></div><h2 className="text-lg font-black text-white tracking-widest uppercase">AKSES TAMU</h2></div>
                  <div><label className="block text-[10px] font-black text-green-500 uppercase tracking-[0.2em] mb-2">EMAIL ANDA</label><input type="email" name="email" required value={authForm.email} onChange={handleAuthInputChange} className="w-full bg-[#0d121f] border border-slate-700/50 rounded-2xl px-5 py-4 text-white outline-none focus:border-green-500 transition-all" placeholder="email@contoh.com" /></div>
                  <button type="submit" disabled={authLoading} className="w-full bg-[#1c2438] border border-slate-700 text-white font-black py-4 rounded-2xl flex items-center justify-center gap-3 uppercase tracking-widest text-sm shadow-xl">{authLoading ? 'MEMPROSES...' : <><ArrowRightCircle size={20} className="text-green-400" /> MULAI COBA GRATIS</>}</button>
                  <button type="button" onClick={() => setAuthView('login')} className="w-full text-center text-[10px] font-black text-slate-500 uppercase tracking-widest py-2">SUDAH PUNYA AKUN? LOGIN</button>
                </form>
              )}

              {authView === 'signup' && (
                <form onSubmit={handleSignup} className="w-full space-y-5">
                  <div className="flex items-center mb-2"><div className="w-1.5 h-6 bg-purple-500 rounded-full mr-3 shadow-[0_0_8px_#a855f7]"></div><h2 className="text-lg font-black text-white tracking-widest uppercase">REGISTRASI</h2></div>
                  <div><label className="block text-[10px] font-black text-purple-500 uppercase tracking-[0.2em] mb-2">EMAIL BARU</label><input type="email" name="email" required value={authForm.email} onChange={handleAuthInputChange} className="w-full bg-[#0d121f] border border-slate-700/50 rounded-2xl px-5 py-4 text-white outline-none focus:border-purple-500 transition-all" placeholder="user@mediaanalytics.ai" /></div>
                  <div><label className="block text-[10px] font-black text-purple-500 uppercase tracking-[0.2em] mb-2">PASSWORD</label><input type="password" name="password" required minLength="6" value={authForm.password} onChange={handleAuthInputChange} className="w-full bg-[#0d121f] border border-slate-700/50 rounded-2xl px-5 py-4 text-white outline-none focus:border-purple-500 transition-all" placeholder="6+ KARAKTER" /></div>
                  <div>
                     <div className="flex justify-between items-center mb-2"><label className="text-[10px] font-black text-purple-500 uppercase tracking-[0.2em]">KODE AKSES</label><button type="button" onClick={openUpgradeModal} className="text-[9px] bg-purple-900/40 text-purple-300 font-black px-2 py-1 rounded border border-purple-500/30 uppercase tracking-widest">BELI KODE AKSES</button></div>
                     <input type="text" name="accessCode" required value={authForm.accessCode} onChange={handleAuthInputChange} className="w-full bg-[#0d121f] border border-slate-700/50 rounded-2xl px-5 py-4 text-center text-white outline-none focus:border-purple-500 uppercase font-mono tracking-[0.3em]" placeholder="MASUKAN KODE" />
                  </div>
                  <button type="submit" disabled={authLoading} className="w-full bg-gradient-to-r from-purple-500 to-blue-600 text-white font-black py-4 rounded-2xl mt-4 uppercase tracking-widest text-sm shadow-lg">{authLoading ? 'MEMPROSES...' : 'DAFTAR AKUN'}</button>
                  <button type="button" onClick={() => setAuthView('login')} className="w-full text-center text-[10px] font-black text-slate-500 uppercase tracking-widest py-2">SUDAH PUNYA AKUN? LOGIN</button>
                </form>
              )}

              {authView === 'forgot' && (
                <form onSubmit={handleResetPassword} className="w-full space-y-6">
                  <div className="flex items-center mb-4"><div className="w-1.5 h-6 bg-slate-400 rounded-full mr-3"></div><h2 className="text-lg font-black text-white tracking-widest uppercase">RESET SANDI</h2></div>
                  <p className="text-[10px] text-slate-400 font-bold uppercase text-center">Tautan reset akan dikirim ke email terdaftar Anda.</p>
                  <input type="email" name="email" required value={authForm.email} onChange={handleAuthInputChange} className="w-full bg-[#0d121f] border border-slate-700/50 rounded-2xl px-5 py-4 text-white outline-none focus:border-cyan-500" placeholder="email@anda.com" />
                  <button type="submit" disabled={authLoading} className="w-full bg-slate-700 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-sm">{authLoading ? 'MENGIRIM...' : 'KIRIM TAUTAN'}</button>
                  <button type="button" onClick={() => setAuthView('login')} className="w-full text-center text-[10px] font-black text-slate-500 uppercase tracking-widest py-2">SUDAH PUNYA AKUN? LOGIN</button>
                </form>
              )}
            </div>
          </div>
        );
      }

      // =========================================================================
      // DASHBOARD UI 
      // =========================================================================
      return (
        <div className="min-h-screen bg-slate-950 font-sans text-slate-200 pb-12 relative selection:bg-cyan-500/30 selection:text-white">
          {renderUpgradeModal()}
          <div className="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-900/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
          <div className="fixed bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-cyan-900/10 rounded-full blur-[100px] pointer-events-none z-0"></div>

          <header className="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50 shadow-lg shadow-black/20">
            <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <div className="bg-slate-800 p-2.5 rounded-xl border border-slate-700 ring-1 ring-cyan-500/30"><Cpu size={24} className="text-cyan-400" /></div>
                <div>
                  <h1 className="text-xl font-bold tracking-tight text-white drop-shadow-sm uppercase">MediaAnalytics<span className="text-cyan-400">.AI</span></h1>
                  <p className="text-[10px] text-cyan-300/70 font-bold tracking-widest uppercase mt-0.5">Aplikasi Pembuat Analisis Isu Otomatis</p>
                </div>
              </div>
              <div className="flex items-center gap-5">
                 <div className="text-right hidden sm:block">
                    <p className="text-sm font-semibold text-slate-300 truncate max-w-[150px]">{user.email}</p>
                    {userData?.role === 'premium' ? <p className="text-[10px] text-amber-400 uppercase tracking-[0.2em] font-bold flex items-center justify-end gap-1 mt-0.5"><Star size={10} fill="currentColor"/> PREMIUM</p> : <p className="text-[10px] text-emerald-400 uppercase tracking-[0.2em] font-bold flex items-center justify-end gap-1 mt-0.5">SISA TOKEN: {userData?.tokens || 0}</p>}
                 </div>
                 {userData?.role === 'guest' && <button onClick={openUpgradeModal} className="bg-amber-500 hover:bg-amber-400 text-white text-xs font-bold px-3 py-2 rounded-lg shadow-lg">UPGRADE</button>}
                 <button onClick={handleLogout} className="bg-slate-800 hover:bg-red-900/80 text-slate-300 hover:text-red-300 p-2.5 rounded-xl transition-all border border-slate-700 group ml-2" title="Keluar"><LogOut size={16} /></button>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8 z-10 relative">
            <div className="lg:col-span-5 space-y-6">
              <div className="bg-[#111827] border border-slate-800 p-6 rounded-[32px] relative overflow-hidden shadow-xl">
                <div className="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-blue-600 to-cyan-400"></div>
                <h2 className="text-lg font-bold mb-6 flex items-center gap-3 text-white uppercase tracking-wider text-sm"><div className="bg-slate-800 p-1.5 rounded-md"><FileText size={18} className="text-cyan-400"/></div> Form Analisis</h2>
                <div className="space-y-5">
                  <input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full p-3 bg-[#0d121f] border border-slate-700 rounded-xl text-white outline-none"/>
                  <input type="text" name="title" placeholder="Judul Isu / Headline..." value={formData.title} onChange={handleInputChange} className="w-full p-3 bg-[#0d121f] border border-slate-700 rounded-xl text-white outline-none font-semibold"/>
                  <input type="url" name="sourceUrl" placeholder="Link Berita (Opsional)" value={formData.sourceUrl} onChange={handleInputChange} className="w-full p-3 bg-[#0d121f] border border-slate-700 rounded-xl text-white outline-none text-sm"/>
                  <textarea name="content" rows="10" placeholder="Salin isi berita ke sini..." value={formData.content} onChange={handleInputChange} className="w-full p-4 bg-[#0d121f] border border-slate-700 rounded-xl text-white outline-none text-sm resize-y leading-relaxed font-medium"></textarea>
                  <div className="flex gap-3">
                    {userData?.role === 'guest' && userData?.tokens <= 0 ? (
                      <button onClick={openUpgradeModal} className="flex-1 bg-amber-500 text-white font-bold py-4 rounded-xl uppercase tracking-widest text-sm shadow-lg"><Star size={18}/> TOKEN HABIS - UPGRADE</button>
                    ) : (
                      <button onClick={generateAnalysis} disabled={isAnalyzing} className="flex-1 bg-blue-700 hover:bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg flex items-center justify-center gap-3 uppercase tracking-widest text-sm transition-all">
                        {isAnalyzing ? 'MENGANALISIS...' : <><Cpu size={18}/> Analytics</>}
                      </button>
                    )}
                    <button onClick={handleReset} className="px-6 bg-[#1c2438] text-slate-300 font-bold rounded-xl border border-slate-700 uppercase text-xs">RESET</button>
                  </div>
                  {errorMsg && <div className="p-3 bg-red-900/30 text-red-400 border border-red-800/50 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-start gap-2 animate-pulse"><AlertTriangle size={14} className="shrink-0" /> {errorMsg}</div>}
                </div>
              </div>
            </div>

            <div className="lg:col-span-7">
              {result && !isAnalyzing ? (
                <div className="bg-[#111827] rounded-[32px] border border-slate-800 overflow-hidden flex flex-col h-full shadow-2xl">
                  <div className="bg-slate-800/50 border-b border-slate-700 p-4 flex justify-between items-center">
                    <h3 className="font-black text-white uppercase text-xs tracking-[0.2em] ml-2">Terminal Output AI</h3>
                    <div className="flex gap-2">
                      <button onClick={() => copyToClipboard(getFormattedText(), 'all')} className="px-4 py-2 text-[10px] bg-slate-700 border border-slate-600 rounded-xl hover:bg-slate-600 text-white font-black uppercase tracking-widest">COPY</button>
                      <button onClick={downloadWord} className="px-4 py-2 text-[10px] font-black bg-cyan-600/20 border border-cyan-500/50 text-cyan-300 rounded-xl hover:bg-cyan-600/40 uppercase tracking-widest transition-all">EXPORT</button>
                    </div>
                  </div>
                  <div className="p-8 space-y-10 overflow-y-auto h-[600px] custom-scrollbar bg-[#0d121f]/50">
                    <div className="border-b border-slate-800 pb-6"><h2 className="text-2xl font-black text-white leading-tight mb-2">{formData.title}</h2><p className="text-[10px] text-slate-500 font-black tracking-widest uppercase">{formData.date}</p></div>
                    
                    <section className="space-y-3"><h4 className="text-xs font-black text-blue-500 uppercase tracking-[0.2em]">01 // Resume Berita</h4><div className="bg-slate-800/40 p-6 rounded-2xl border border-slate-700/50"><p className="text-slate-300 text-sm leading-relaxed text-justify">{result.resume}</p></div></section>
                    
                    <section className="space-y-3"><h4 className="text-xs font-black text-indigo-500 uppercase tracking-[0.2em]">02 // Analisis Deskriptif</h4><div className="bg-slate-800/40 p-6 rounded-2xl border border-slate-700/50"><p className="text-slate-300 text-sm leading-relaxed text-justify">{result.analisis_deskriptif}</p></div></section>
                    
                    <section className="space-y-3"><h4 className="text-xs font-black text-amber-500 uppercase tracking-[0.2em]">03 // Analisis SWOT</h4>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="bg-emerald-950/20 p-5 rounded-2xl border border-emerald-900/30">
                          <h5 className="text-emerald-400 font-black mb-3 uppercase text-[9px] tracking-widest">Strengths (Kekuatan)</h5>
                          <ul className="text-slate-300 text-[11px] font-bold space-y-2 leading-relaxed">{result.swot_kekuatan.map((i,x)=><li key={x} className="flex gap-2 items-start"><span className="text-emerald-500 shrink-0 mt-1">●</span> {i}</li>)}</ul>
                        </div>
                        <div className="bg-orange-950/20 p-5 rounded-2xl border border-orange-900/30">
                          <h5 className="text-orange-400 font-black mb-3 uppercase text-[9px] tracking-widest">Weaknesses (Kelemahan)</h5>
                          <ul className="text-slate-300 text-[11px] font-bold space-y-2 leading-relaxed">{result.swot_kelemahan.map((i,x)=><li key={x} className="flex gap-2 items-start"><span className="text-orange-500 shrink-0 mt-1">●</span> {i}</li>)}</ul>
                        </div>
                        <div className="bg-blue-950/20 p-5 rounded-2xl border border-blue-900/30">
                          <h5 className="text-blue-400 font-black mb-3 uppercase text-[9px] tracking-widest">Opportunities (Peluang)</h5>
                          <ul className="text-slate-300 text-[11px] font-bold space-y-2 leading-relaxed">{result.swot_peluang.map((i,x)=><li key={x} className="flex gap-2 items-start"><span className="text-blue-500 shrink-0 mt-1">●</span> {i}</li>)}</ul>
                        </div>
                        <div className="bg-red-950/20 p-5 rounded-2xl border border-red-900/30">
                          <h5 className="text-red-400 font-black mb-3 uppercase text-[9px] tracking-widest">Threats (Ancaman)</h5>
                          <ul className="text-slate-300 text-[11px] font-bold space-y-2 leading-relaxed">{result.swot_ancaman.map((i,x)=><li key={x} className="flex gap-2 items-start"><span className="text-red-500 shrink-0 mt-1">●</span> {i}</li>)}</ul>
                        </div>
                      </div>
                    </section>
                    
                    <section className="space-y-3"><h4 className="text-xs font-black text-green-500 uppercase tracking-[0.2em]">04 // Rekomendasi Kebijakan</h4><div className="bg-slate-800/40 p-6 rounded-2xl border border-slate-700/50"><ul className="text-slate-300 text-[11px] font-bold space-y-3 leading-relaxed">{result.kebijakan.map((i,x)=><li key={x} className="flex gap-3"><span className="text-green-500 shrink-0 font-mono">[{x+1}]</span> {i}</li>)}</ul></div></section>
                    
                    <section className="space-y-3"><h4 className="text-xs font-black text-purple-500 uppercase tracking-[0.2em]">05 // Strategi Komunikasi</h4><div className="bg-slate-800/40 p-6 rounded-2xl border border-slate-700/50"><ul className="text-slate-300 text-[11px] font-bold space-y-3 leading-relaxed">{result.strategi_komunikasi.map((i,x)=><li key={x} className="flex gap-3"><span className="text-purple-500 shrink-0 font-mono">[{x+1}]</span> {i}</li>)}</ul></div></section>

                    <section className="space-y-3"><h4 className="text-xs font-black text-cyan-500 uppercase tracking-[0.2em]">06 // Rekomendasi Publikasi</h4><div className="bg-slate-800/40 p-6 rounded-2xl border border-slate-700/50"><ul className="text-slate-300 text-[11px] font-bold space-y-3 leading-relaxed">{result.rekomendasi_publikasi.map((i,x)=><li key={x} className="flex gap-3"><span className="text-cyan-500 shrink-0 font-mono">[{x+1}]</span> {i}</li>)}</ul></div></section>

                    <section className="space-y-3"><h4 className="text-xs font-black text-rose-500 uppercase tracking-[0.2em]">07 // Kesimpulan</h4><div className="bg-slate-800/40 p-6 rounded-2xl border border-slate-700/50"><p className="text-slate-300 text-sm leading-relaxed text-justify">{result.kesimpulan}</p></div></section>
                  </div>
                </div>
              ) : (
                <div className="h-full flex flex-col items-center justify-center p-12 border border-dashed border-slate-700 rounded-[50px] bg-[#111827]/50 min-h-[500px]">
                  <Cpu size={64} className={isAnalyzing ? 'text-cyan-300 animate-pulse' : 'text-slate-800'} />
                  <p className="text-cyan-400 text-sm font-black tracking-[0.3em] uppercase mt-8">{isAnalyzing ? 'PROSES ANALISIS...' : 'SISTEM MENUNGGU DATA'}</p>
                  <p className="text-slate-600 text-[10px] font-bold uppercase tracking-widest mt-4 text-center max-w-xs leading-relaxed">Masukkan teks media di panel kiri untuk memulai proses analisis kebijakan otomatis berbasis AI sesuai EYD.</p>
                </div>
              )}
            </div>
          </main>

          <style dangerouslySetInnerHTML={{__html: `.custom-scrollbar::-webkit-scrollbar { width: 5px; } .custom-scrollbar::-webkit-scrollbar-track { background: transparent; } .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #1e293b; border-radius: 10px; }`}} />
        </div>
      );
    };

    // Melakukan render komponen App ke dalam div id="root"
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
